<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#e60000" />
    <title>🍔 Tasty Bites - Food Delivery</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>

    <!-- Leaflet.js for maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>

    <style>
        /* ======================================== */
        /* COMPLETE STYLES - FIXED */
        /* ======================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #e60000;
            --primary-dark: #cc0000;
            --primary-light: #ff1a1a;
            --secondary: #ffcc00;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e74c3c;
            --text: #2d3436;
            --text-light: #636e72;
            --bg: #f5f6fa;
            --card: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: calc(80px + var(--safe-bottom));
            overflow-x: hidden;
        }

        /* App Header */
        .app-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 14px 20px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(230, 0, 0, 0.3);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .app-logo {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .header-text {
            flex: 1;
        }
        .header-text h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
        .header-text p {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: -1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            position: relative;
        }

        .cart-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .cart-badge {
            background: var(--secondary);
            color: var(--primary);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        /* Category Tabs */
        .category-tabs {
            background: #fff;
            padding: 10px 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 72px;
            z-index: 99;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            background: none;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .category-tab.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(230, 0, 0, 0.25);
        }

        .category-tab:hover:not(.active) {
            background: #f0f0f0;
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 12px 16px 20px;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .menu-item {
            background: #fff;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid #f0f0f0;
        }

        .menu-item:hover {
            transform: translateY(-3px);
        }

        .menu-item-image {
            width: 100%;
            height: 140px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
        }

        .menu-item-image .badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
        }

        .menu-item-info {
            padding: 12px 14px 14px;
        }
        .menu-item-info h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .menu-item-info .description {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .menu-item-info .price {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .menu-item-info .price span {
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-light);
        }

        .add-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 14px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            float: right;
            margin-top: 4px;
        }

        .add-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .add-btn:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            backdrop-filter: blur(8px);
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 20px 20px 0 0;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            padding: 20px 24px 30px;
            animation: slideUp 0.3s ease;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px 8px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }
        .cart-item-info .name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .cart-item-info .price {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .cart-item-qty button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item-qty button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .cart-item-qty .qty {
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            font-size: 1.1rem;
            font-weight: 700;
            border-top: 2px solid #f0f0f0;
            margin-top: 4px;
        }

        .checkout-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(230, 0, 0, 0.4);
        }

        .checkout-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-cart {
            text-align: center;
            padding: 30px 0;
            color: var(--text-light);
        }
        .empty-cart .empty-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* Checkout Form */
        .checkout-form {
            margin-top: 16px;
            display: none;
        }
        .checkout-form.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.3s;
            background: #fafafa;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Location Picker */
        .location-picker {
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
            margin-bottom: 8px;
            position: relative;
        }
        .location-picker .leaflet-control-attribution {
            font-size: 0.5rem;
        }

        .get-location-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 8px;
        }
        .get-location-btn:hover {
            background: var(--primary-dark);
        }

        .location-status {
            font-size: 0.7rem;
            color: var(--text-light);
            text-align: center;
        }

        /* Order Status */
        .order-status {
            margin-top: 16px;
            padding: 14px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .order-status.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .order-status .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .order-status .status-header h4 {
            font-size: 0.95rem;
        }
        .order-status .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-badge.pending {
            background: #fdcb6e;
            color: #6c5200;
        }
        .status-badge.accepted {
            background: #74b9ff;
            color: #003b6c;
        }
        .status-badge.preparing {
            background: #a29bfe;
            color: #3d0070;
        }
        .status-badge.ready {
            background: #55efc4;
            color: #007050;
        }
        .status-badge.delivering {
            background: #fd79a8;
            color: #700030;
        }
        .status-badge.delivered {
            background: #00b894;
            color: #fff;
        }
        .status-badge.cancelled {
            background: #e74c3c;
            color: #fff;
        }

        .order-status .order-details {
            font-size: 0.8rem;
            color: var(--text-light);
            line-height: 1.6;
        }
        .order-status .order-details strong {
            color: var(--text);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + var(--safe-bottom));
            box-shadow: 0 -2px 15px rgba(0, 0, 0, 0.06);
            z-index: 100;
            border-top: 1px solid #f0f0f0;
        }

        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 16px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
        }
        .nav-icon {
            font-size: 1.4rem;
            transition: transform 0.2s;
        }
        .nav-label {
            font-size: 0.55rem;
            color: var(--text-light);
            font-weight: 500;
            margin-top: 2px;
            transition: color 0.2s;
        }
        .nav-item.active .nav-label {
            color: var(--primary);
        }
        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }
        .nav-badge {
            position: absolute;
            top: 0;
            right: 4px;
            background: var(--primary);
            color: #fff;
            font-size: 0.5rem;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            z-index: 300;
            opacity: 0;
            transition: all 0.4s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        .toast.success {
            background: var(--success);
        }
        .toast.error {
            background: var(--danger);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .footer-links {
            text-align: center;
            padding: 16px 0 8px;
            font-size: 0.7rem;
            color: var(--text-light);
        }
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin: 0 8px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .menu-item-image {
                height: 110px;
            }
            .menu-item-info {
                padding: 10px 12px 12px;
            }
            .menu-item-info h3 {
                font-size: 0.8rem;
            }
            .menu-item-info .price {
                font-size: 0.85rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 16px 16px 24px;
            }
            .header-text h1 {
                font-size: 0.95rem;
            }
            .category-tabs {
                padding: 8px 12px;
                top: 66px;
            }
            .category-tab {
                font-size: 0.7rem;
                padding: 6px 14px;
            }
            .location-picker {
                height: 140px;
            }
            .cart-btn span {
                display: none;
            }
        }

        @media (min-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 18px;
            }
        }

        @media (min-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- ===== APP HEADER ===== -->
    <header class="app-header">
        <div class="header-content">
            <div class="app-logo">🍔</div>
            <div class="header-text">
                <h1>Tasty Bites</h1>
                <p>Fast Food Delivery</p>
            </div>
            <div class="header-right">
                <button class="cart-btn" onclick="openCart()">
                    🛒 <span id="cartCount">0</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== CATEGORY TABS ===== -->
    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="all">🍽️ All</button>
        <button class="category-tab" data-category="burgers">🍔 Burgers</button>
        <button class="category-tab" data-category="pizza">🍕 Pizza</button>
        <button class="category-tab" data-category="chicken">🍗 Chicken</button>
        <button class="category-tab" data-category="drinks">🥤 Drinks</button>
        <button class="category-tab" data-category="sides">🍟 Sides</button>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <div class="menu-grid" id="menuGrid">
            <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-light);">
                <div class="spinner" style="border-color:var(--text-light);border-top-color:var(--primary);"></div>
                <p style="margin-top:10px;">Loading menu...</p>
            </div>
        </div>

        <div class="footer-links">
            <a href="admin.html">🔧 Admin Panel</a>
            <a href="delivery.html">🚴 Delivery View</a>
        </div>
    </div>

    <!-- ===== CART MODAL ===== -->
    <div class="modal-overlay" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 Your Cart</h2>
                <button class="modal-close" onclick="closeCart()">✕</button>
            </div>
            <div id="cartItems">
                <div class="empty-cart">
                    <div class="empty-icon">🛒</div>
                    <p>Your cart is empty</p>
                </div>
            </div>
            <div class="cart-total" id="cartTotal" style="display:none;">
                <span>Total</span>
                <span id="totalAmount">K0.00</span>
            </div>

            <!-- Checkout Form -->
            <div class="checkout-form" id="checkoutForm">
                <h4 style="margin-bottom:10px;">📍 Delivery Information</h4>

                <div class="form-group">
                    <label>📱 Phone Number</label>
                    <input type="tel" id="phoneNumber" placeholder="0977123456" />
                </div>

                <div class="form-group">
                    <label>📍 Your Location</label>
                    <div class="location-picker" id="mapContainer"></div>
                    <button class="get-location-btn" onclick="getUserLocation()">📍 Get My Location</button>
                    <div class="location-status" id="locationStatus">Click to share your location</div>
                    <input type="hidden" id="latitude" />
                    <input type="hidden" id="longitude" />
                    <input type="hidden" id="address" />
                </div>

                <div class="form-group">
                    <label>📝 Delivery Notes</label>
                    <textarea id="deliveryNotes" placeholder="Gate code, landmark, etc."></textarea>
                </div>

                <div class="form-group">
                    <label>💳 Payment Method</label>
                    <select id="paymentMethod">
                        <option value="cash">Cash on Delivery</option>
                        <option value="mobile">Mobile Money</option>
                        <option value="card">Card Payment</option>
                    </select>
                </div>

                <button class="checkout-btn" id="placeOrderBtn" onclick="placeOrder()">✅ Place Order</button>
            </div>

            <button class="checkout-btn" id="checkoutBtn" onclick="showCheckout()" style="margin-top:10px;">💳 Proceed to Checkout</button>

            <!-- Order Status -->
            <div class="order-status" id="orderStatus">
                <div class="status-header">
                    <h4>📦 Order Status</h4>
                    <span class="status-badge pending" id="orderStatusBadge">Pending</span>
                </div>
                <div class="order-details" id="orderDetails">
                    <p><strong>Order #:</strong> <span id="orderNumber">-</span></p>
                    <p><strong>Items:</strong> <span id="orderItems">-</span></p>
                    <p><strong>Total:</strong> <span id="orderTotal">-</span></p>
                    <p><strong>Address:</strong> <span id="orderAddress">-</span></p>
                    <p><strong>Payment:</strong> <span id="orderPayment">-</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('menu')">
            <span class="nav-icon">🍽️</span>
            <span class="nav-label">Menu</span>
        </button>
        <button class="nav-item" onclick="switchTab('orders')">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Orders</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Profile</span>
        </button>
    </nav>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ========================================= -->
    <!-- SCRIPTS -->
    <!-- ========================================= -->
    <script>
        // ========================================
        // SUPABASE CONFIG - UPDATE THESE!
        // ========================================

       const SUPABASE_URL = 'https://qphrmjjdfbdwdtdkhn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJ1IjUzI1NIsInR5cCI6IkpXVlC9...eyJpc3Mi0iJ2zdXBhYmFzZSIsInJ1ZiI6InFwa';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ========================================
        // STATE
        // ========================================

        let cart = [];
        let menuItems = [];
        let currentCategory = 'all';
        let currentOrderId = null;
        let map = null;
        let marker = null;
        let userLat = null;
        let userLng = null;

        // ========================================
        // TOAST
        // ========================================

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ========================================
        // LOAD MENU
        // ========================================

        async function loadMenu() {
            try {
                const { data, error } = await supabase
                    .from('menu_items')
                    .select('*')
                    .order('category');

                if (error) throw error;

                menuItems = data || [];
                renderMenu();
            } catch (error) {
                console.error('Error loading menu:', error);
                document.getElementById('menuGrid').innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-light);">
                        <p style="font-size:2rem;">😅</p>
                        <p>Could not load menu. Please try again.</p>
                        <button onclick="loadMenu()" style="margin-top:10px;padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;">Retry</button>
                    </div>
                `;
            }
        }

        // ========================================
        // RENDER MENU
        // ========================================

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            const filtered = currentCategory === 'all' ?
                menuItems :
                menuItems.filter(item => item.category === currentCategory);

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-light);">
                        <p style="font-size:3rem;">🍽️</p>
                        <p>No items in this category</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <div class="menu-item" data-id="${item.id}">
                    <div class="menu-item-image" style="background:${item.color || '#f0f0f0'};">
                        ${item.image_emoji || '🍔'}
                        ${item.is_featured ? '<span class="badge">🔥 Popular</span>' : ''}
                    </div>
                    <div class="menu-item-info">
                        <h3>${item.name}</h3>
                        <div class="description">${item.description || ''}</div>
                        <div class="price">K${item.price.toFixed(2)}</div>
                        <button class="add-btn ${item.quantity > 0 ? '' : 'out-of-stock'}" 
                                onclick="addToCart('${item.id}')" 
                                ${item.quantity > 0 ? '' : 'disabled'}>
                            ${item.quantity > 0 ? '➕ Add' : '😞 Out of Stock'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ========================================
        // CATEGORY FILTER
        // ========================================

        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
                renderMenu();
            });
        });

        // ========================================
        // CART FUNCTIONS
        // ========================================

        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            if (!item || item.quantity <= 0) {
                showToast('Sorry, this item is out of stock!', 'error');
                return;
            }

            const existing = cart.find(i => i.id === itemId);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...item, qty: 1 });
            }

            updateCartUI();
            showToast(`✅ ${item.name} added to cart!`);
        }

        function removeFromCart(itemId) {
            const index = cart.findIndex(i => i.id === itemId);
            if (index > -1) {
                if (cart[index].qty > 1) {
                    cart[index].qty -= 1;
                } else {
                    cart.splice(index, 1);
                }
            }
            updateCartUI();
        }

        function updateCartUI() {
            const totalItems = cart.reduce((sum, i) => sum + i.qty, 0);
            document.getElementById('cartCount').textContent = totalItems;
            document.getElementById('cartBadge').textContent = totalItems;

            const totalAmount = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            document.getElementById('totalAmount').textContent = `K${totalAmount.toFixed(2)}`;

            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-icon">🛒</div>
                        <p>Your cart is empty</p>
                    </div>
                `;
                document.getElementById('cartTotal').style.display = 'none';
                document.getElementById('checkoutBtn').style.display = 'none';
                document.getElementById('checkoutForm').classList.remove('show');
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <span class="name">${item.name}</span>
                        <span class="price">K${item.price.toFixed(2)} × ${item.qty}</span>
                    </div>
                    <div class="cart-item-qty">
                        <button onclick="removeFromCart('${item.id}')">−</button>
                        <span class="qty">${item.qty}</span>
                        <button onclick="addToCart('${item.id}')">+</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('cartTotal').style.display = 'flex';
            document.getElementById('checkoutBtn').style.display = 'block';
        }

        // ========================================
        // CART MODAL
        // ========================================

        function openCart() {
            document.getElementById('cartModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            updateCartUI();
            setTimeout(initMap, 300);
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ========================================
        // CHECKOUT
        // ========================================

        function showCheckout() {
            if (cart.length === 0) {
                showToast('Your cart is empty!', 'error');
                return;
            }
            document.getElementById('checkoutForm').classList.toggle('show');
        }

        // ========================================
        // LOCATION
        // ========================================

        function initMap() {
            const container = document.getElementById('mapContainer');
            if (!container._mapInitialized) {
                map = L.map(container).setView([-15.4167, 28.2833], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap'
                }).addTo(map);

                container._mapInitialized = true;

                map.on('click', function(e) {
                    setLocation(e.latlng.lat, e.latlng.lng);
                });
            }
            setTimeout(() => map.invalidateSize(), 200);
        }

        function getUserLocation() {
            const status = document.getElementById('locationStatus');
            status.textContent = '📍 Getting your location...';

            if (!navigator.geolocation) {
                status.textContent = '❌ Geolocation not supported';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    setLocation(pos.coords.latitude, pos.coords.longitude);
                    status.textContent = '✅ Location captured!';
                    showToast('📍 Location captured successfully!');
                },
                function(err) {
                    status.textContent = '❌ Could not get location. Click on the map.';
                    showToast('❌ Could not get location', 'error');
                }, { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function setLocation(lat, lng) {
            userLat = lat;
            userLng = lng;
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;

            if (marker) {
                map.removeLayer(marker);
            }
            marker = L.marker([lat, lng]).addTo(map);
            map.setView([lat, lng], 16);

            // Reverse geocode
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`)
                .then(res => res.json())
                .then(data => {
                    const address = data.display_name || `${lat}, ${lng}`;
                    document.getElementById('address').value = address;
                    document.getElementById('locationStatus').textContent = `📍 ${address}`;
                })
                .catch(() => {
                    document.getElementById('address').value = `${lat}, ${lng}`;
                    document.getElementById('locationStatus').textContent = `📍 ${lat}, ${lng}`;
                });
        }

        // ========================================
        // PLACE ORDER
        // ========================================

        async function placeOrder() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const lat = document.getElementById('latitude').value;
            const lng = document.getElementById('longitude').value;
            const address = document.getElementById('address').value.trim();
            const notes = document.getElementById('deliveryNotes').value.trim();
            const payment = document.getElementById('paymentMethod').value;

            if (!phone || phone.length < 8) {
                showToast('Please enter a valid phone number', 'error');
                return;
            }

            if (!lat || !lng) {
                showToast('Please set your delivery location', 'error');
                return;
            }

            if (cart.length === 0) {
                showToast('Your cart is empty!', 'error');
                return;
            }

            const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            const items = cart.map(i => ({ id: i.id, name: i.name, qty: i.qty, price: i.price }));

            const orderData = {
                customer_name: 'Customer',
                phone: phone,
                items: items,
                total: total,
                address: address,
                latitude: parseFloat(lat),
                longitude: parseFloat(lng),
                delivery_notes: notes,
                payment_method: payment,
                status: 'pending',
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabase
                    .from('orders')
                    .insert([orderData])
                    .select();

                if (error) throw error;

                currentOrderId = data[0].id;
                document.getElementById('orderNumber').textContent = `#${String(currentOrderId).slice(-6)}`;
                document.getElementById('orderItems').textContent = items.map(i => `${i.name} ×${i.qty}`).join(', ');
                document.getElementById('orderTotal').textContent = `K${total.toFixed(2)}`;
                document.getElementById('orderAddress').textContent = address || '📍 Location selected';
                document.getElementById('orderPayment').textContent = payment.charAt(0).toUpperCase() + payment.slice(1);
                document.getElementById('orderStatus').classList.add('show');
                document.getElementById('orderStatusBadge').className = 'status-badge pending';
                document.getElementById('orderStatusBadge').textContent = '🕐 Pending';

                cart = [];
                updateCartUI();
                document.getElementById('checkoutForm').classList.remove('show');
                document.getElementById('checkoutBtn').style.display = 'none';

                showToast('✅ Order placed successfully!');

            } catch (error) {
                console.error('Error placing order:', error);
                showToast('❌ Error: ' + error.message, 'error');
            }
        }

        // ========================================
        // TAB SWITCHING
        // ========================================

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.querySelector(`.nav-item[onclick*="${tab}"]`)?.classList.add('active');

            if (tab === 'orders') {
                showToast('📦 Your orders will appear here', 'success');
            } else if (tab === 'profile') {
                showToast('👤 Profile coming soon', 'success');
            }
        }

        // ========================================
        // INIT
        // ========================================

        document.addEventListener('DOMContentLoaded', function() {
            loadMenu();

            document.getElementById('cartModal').addEventListener('click', function(e) {
                if (e.target === this) closeCart();
            });
        });

        // Make functions globally accessible
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.openCart = openCart;
        window.closeCart = closeCart;
        window.showCheckout = showCheckout;
        window.placeOrder = placeOrder;
        window.getUserLocation = getUserLocation;
        window.initMap = initMap;
        window.switchTab = switchTab;
        window.loadMenu = loadMenu;
    </script>

</body>
</html>
